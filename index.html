<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Keep this page off Google so it stays our secret -->
  <meta name="robots" content="noindex, nofollow">
  <title>Ben's Music Maker</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%B5%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --p1: #ff5fa2;
      --p2: #ffd23f;
      --p3: #3fd0ff;
      --p4: #8a5cff;
      --p5: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
    html, body { height: 100%; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      background: linear-gradient(120deg, var(--p4), var(--p1), var(--p2), var(--p3));
      background-size: 400% 400%;
      animation: flow 16s ease infinite;
      padding: 26px 16px 60px;
    }
    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 {
      font-size: clamp(1.7rem, 7vw, 2.6rem);
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    }
    .sub {
      font-size: clamp(0.9rem, 3.2vw, 1.1rem);
      margin: 8px 0 22px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
    }

    /* ---- Controls ---- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 22px;
    }
    .ctrl-btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      background: rgba(255,255,255,0.22);
      border: 3px solid #fff;
      border-radius: 999px;
      padding: 10px 20px;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.2);
    }
    .ctrl-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    .ctrl-btn.play { background: rgba(74,222,128,0.4); }
    .ctrl-btn.playing { background: rgba(255,59,59,0.45); }
    .speed-row { display: flex; gap: 8px; }
    .speed-btn {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      color: #fff;
      background: rgba(255,255,255,0.16);
      border: 2px solid #fff;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
    }
    .speed-btn.active { background: rgba(255,255,255,0.55); color: #1a2a5a; }

    .save-status {
      min-height: 1.4em;
      font-size: 0.95rem;
      font-weight: bold;
      margin-bottom: 14px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .save-status.show { opacity: 1; }

    /* ---- Song parts ---- */
    .parts-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      max-width: 700px;
      margin: 0 auto 16px;
    }
    .part-tab {
      position: relative;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      color: #fff;
      background: rgba(255,255,255,0.18);
      border: 3px solid #fff;
      border-radius: 999px;
      padding: 8px 18px;
      cursor: pointer;
    }
    .part-tab.active { background: rgba(255,255,255,0.55); color: #1a2a5a; }
    .part-tab .part-delete {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ff3b3b;
      color: #fff;
      border: 2px solid #fff;
      font-size: 0.6rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .part-add-btn {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      color: #fff;
      background: rgba(74,222,128,0.32);
      border: 3px dashed #fff;
      border-radius: 999px;
      padding: 8px 18px;
      cursor: pointer;
    }
    .part-add-btn:active { transform: translateY(2px); }

    /* ---- Music chart (note grid) ---- */
    .chart-wrap {
      overflow-x: auto;
      max-width: 720px;
      margin: 0 auto 26px;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .chart {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      background: rgba(255,255,255,0.12);
      border: 4px solid #fff;
      border-radius: 20px;
      padding: 12px;
    }
    .note-row { display: flex; align-items: center; gap: 4px; }
    .note-label {
      width: 30px;
      flex: 0 0 auto;
      font-size: 0.75rem;
      font-weight: bold;
      opacity: 0.85;
      text-align: right;
      padding-right: 4px;
    }
    .step-btn {
      width: 26px;
      height: 26px;
      flex: 0 0 auto;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.12);
      cursor: pointer;
      padding: 0;
    }
    .step-btn:nth-child(4n+1) { border-left: 3px solid rgba(255,255,255,0.8); }
    .step-btn.active { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.6); }
    .step-btn.playhead { outline: 3px solid #fff; outline-offset: 1px; }

    /* Hold a note to pick how loud it is — dimmer for soft, brighter/bigger glow for loud */
    .step-btn.active.vol-1 { opacity: 0.55; box-shadow: none; }
    .step-btn.active.vol-2 { opacity: 0.85; }
    .step-btn.active.vol-3 { opacity: 1; box-shadow: 0 0 10px rgba(255,255,255,0.95); transform: scale(1.08); }

    /* Color-code each note letter, consistent top-to-bottom */
    .note-C .step-btn.active { background: var(--p1); }
    .note-D .step-btn.active { background: var(--p2); }
    .note-E .step-btn.active { background: var(--p3); }
    .note-G .step-btn.active { background: var(--p4); }
    .note-A .step-btn.active { background: var(--p5); }

    /* ---- Tips card ---- */
    .tips-card {
      max-width: 420px;
      margin: 0 auto;
      background: rgba(255,255,255,0.22);
      border: 4px solid #fff;
      border-radius: 26px;
      padding: 20px 22px;
      box-shadow: 0 8px 0 rgba(0,0,0,0.2);
    }
    .tips-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
    }
    .tip-text {
      font-size: 1rem;
      min-height: 3.2em;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .tip-next-btn {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: bold;
      color: #fff;
      background: rgba(255,255,255,0.24);
      border: 3px solid #fff;
      border-radius: 999px;
      padding: 8px 20px;
      cursor: pointer;
    }
    .tip-next-btn:active { transform: translateY(2px); }

    /* ---- My Songs list ---- */
    .songs-section { max-width: 700px; margin: 0 auto 26px; }
    .songs-title {
      font-size: clamp(1.1rem, 4.5vw, 1.4rem);
      margin-bottom: 12px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }
    .songs-empty { font-size: 0.95rem; opacity: 0.85; margin-bottom: 10px; }
    .songs-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }
    .song-card {
      position: relative;
      background: rgba(255,255,255,0.2);
      border: 3px solid #fff;
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      min-width: 120px;
    }
    .song-card:active { transform: translateY(2px); }
    .song-card.active { background: rgba(255,255,255,0.5); color: #1a2a5a; }
    .song-card .song-name { font-weight: bold; font-size: 0.95rem; padding: 0 18px; }
    .song-card .song-delete {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ff3b3b;
      color: #fff;
      border: 2px solid #fff;
      font-size: 0.7rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .song-card .song-rename {
      position: absolute;
      top: -8px;
      left: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #3fd0ff;
      color: #fff;
      border: 2px solid #fff;
      font-size: 0.7rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* ---- Name-your-song modal ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal-card {
      background: rgba(120,70,160,0.92);
      border: 4px solid #fff;
      border-radius: 26px;
      padding: 26px 24px;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 8px 0 rgba(0,0,0,0.25);
    }
    .modal-title { font-size: 1.15rem; font-weight: bold; margin-bottom: 14px; }
    .modal-input {
      width: 100%;
      font-family: inherit;
      font-size: 1.1rem;
      text-align: center;
      color: #333;
      background: #fff;
      border: 4px solid #fff;
      border-radius: 14px;
      padding: 10px;
    }
    .modal-btns { display: flex; gap: 12px; margin-top: 18px; }
    .modal-btn {
      flex: 1;
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      border: 3px solid #fff;
      border-radius: 999px;
      padding: 12px 10px;
      cursor: pointer;
    }
    .modal-btn.confirm { background: rgba(74,222,128,0.5); }
    .modal-btn.cancel { background: rgba(255,255,255,0.15); }

    /* ---- Note volume modal (hold a note to open) ---- */
    .volume-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
    .volume-btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      background: rgba(255,255,255,0.18);
      border: 3px solid #fff;
      border-radius: 999px;
      padding: 12px 10px;
      cursor: pointer;
    }
    .volume-btn:active { transform: translateY(2px); }
    .volume-btn.current { border-width: 5px; background: rgba(255,255,255,0.4); }
    .volume-btn.off { background: rgba(255,59,59,0.3); margin-top: 4px; }
  </style>
</head>
<body>
  <h1>🎵 Ben's Music Maker 🎵</h1>
  <p class="sub">Tap boxes to add notes (hold one to pick its volume!), then hit Play!</p>

  <div class="controls">
    <button class="ctrl-btn play" id="playBtn">▶️ Play</button>
    <button class="ctrl-btn" id="newSongBtn">🆕 New Song</button>
    <button class="ctrl-btn" id="saveBtn">💾 Save</button>
    <button class="ctrl-btn" id="clearBtn">🔄 Clear</button>
    <div class="speed-row" id="speedRow">
      <button class="speed-btn" data-speed="400">🐢 Slow</button>
      <button class="speed-btn active" data-speed="250">🚶 Normal</button>
      <button class="speed-btn" data-speed="150">🐇 Fast</button>
    </div>
    <div class="speed-row" id="volumeRow">
      <button class="speed-btn" data-vol="0.5">🔈 Quiet</button>
      <button class="speed-btn active" data-vol="1">🔉 Normal</button>
      <button class="speed-btn" data-vol="1.6">🔊 Loud</button>
    </div>
  </div>

  <div class="save-status" id="saveStatus"></div>

  <div class="parts-row" id="partsRow"></div>

  <div class="chart-wrap">
    <div class="chart" id="chart"></div>
  </div>

  <div class="songs-section">
    <div class="songs-title">🎼 My Songs</div>
    <div class="songs-empty" id="songsEmpty">You haven't saved any songs yet!</div>
    <div class="songs-grid" id="songsGrid"></div>
  </div>

  <div class="modal-overlay" id="nameModalOverlay">
    <div class="modal-card">
      <div class="modal-title" id="nameModalTitle">🎵 Name your song!</div>
      <input class="modal-input" id="nameModalInput" type="text" maxlength="30">
      <div class="modal-btns">
        <button class="modal-btn confirm" id="nameModalSaveBtn">💾 Save</button>
        <button class="modal-btn cancel" id="nameModalCancelBtn">✖️ Cancel</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="volumeModalOverlay">
    <div class="modal-card">
      <div class="modal-title">🎚️ Pick a Volume</div>
      <div class="volume-btns">
        <button class="volume-btn" data-level="3">🔊 Loud</button>
        <button class="volume-btn" data-level="2">🔉 Medium</button>
        <button class="volume-btn" data-level="1">🔈 Soft</button>
        <button class="volume-btn off" data-level="0">🔇 Turn Off</button>
      </div>
    </div>
  </div>

  <div class="tips-card">
    <div class="tips-title">💡 Music Tip</div>
    <div class="tip-text" id="tipText">Tap "Next Tip" for an idea!</div>
    <button class="tip-next-btn" id="tipNextBtn">➡️ Next Tip</button>
  </div>

  <script>
    // Two octaves of a C major pentatonic scale — every note sounds good together!
    var NOTES = [
      { letter: "A", label: "A5", freq: 880.00 },
      { letter: "G", label: "G5", freq: 783.99 },
      { letter: "E", label: "E5", freq: 659.25 },
      { letter: "D", label: "D5", freq: 587.33 },
      { letter: "C", label: "C5", freq: 523.25 },
      { letter: "A", label: "A4", freq: 440.00 },
      { letter: "G", label: "G4", freq: 392.00 },
      { letter: "E", label: "E4", freq: 329.63 },
      { letter: "D", label: "D4", freq: 293.66 },
      { letter: "C", label: "C4", freq: 261.63 }
    ];
    var STEPS = 16;

    var TIPS = [
      "🎶 Try starting and ending your song on the same note — it feels complete!",
      "🥁 A steady beat helps people want to dance or clap along!",
      "🎵 Leaving some empty spaces is music too — silence counts!",
      "🎼 Try repeating a little pattern 2 or 3 times to make it catchy!",
      "🎹 Mixing high notes and low notes makes your song more interesting!",
      "🔊 Try putting some notes close together and some far apart!",
      "🌈 There are no wrong notes here — everything fits together!",
      "⏱️ Try changing the speed to make your song feel different!",
      "🔁 Loop your favorite part and listen to it a few times in a row!",
      "🎤 Once you like your song, give it a name in your head!",
      "🧩 Add a new part to build a longer song, like a verse and a chorus!",
      "🎚️ Hold down a note to pick how soft or loud it plays!"
    ];

    function makeEmptyGrid() {
      return NOTES.map(function () { return new Array(STEPS).fill(0); });
    }

    // A cell's value is 0 (off) or 1/2/3 for how loud that note plays.
    var VOLUME_LEVELS = [
      { gain: 0.08 }, // 1 = Soft
      { gain: 0.2 },  // 2 = Medium
      { gain: 0.4 }   // 3 = Loud
    ];
    var DEFAULT_VOLUME_LEVEL = 2; // what a quick tap turns a note on at

    function updateVolClass(btn, level) {
      btn.classList.remove("vol-1", "vol-2", "vol-3");
      if (level > 0) btn.classList.add("vol-" + level);
    }

    // A song is made of one or more "parts" — each its own 16-step grid.
    // Playback plays every part in order, then loops back to the first.
    var parts = [makeEmptyGrid()];
    var currentPartIndex = 0;
    var grid = parts[currentPartIndex]; // the part currently shown/edited

    var chartEl = document.getElementById("chart");
    var cellButtons = []; // cellButtons[row][step]

    NOTES.forEach(function (note, row) {
      var rowEl = document.createElement("div");
      rowEl.className = "note-row note-" + note.letter;

      var label = document.createElement("span");
      label.className = "note-label";
      label.textContent = note.label;
      rowEl.appendChild(label);

      var rowButtons = [];
      for (var step = 0; step < STEPS; step++) {
        var btn = document.createElement("button");
        btn.className = "step-btn";

        (function (row, step, btn) {
          btn.addEventListener("mousedown", function () { startHold(row, step); });
          btn.addEventListener("touchstart", function () { startHold(row, step); }, { passive: true });
          btn.addEventListener("mouseup", cancelHold);
          btn.addEventListener("mouseleave", cancelHold);
          btn.addEventListener("touchend", cancelHold);
          btn.addEventListener("touchcancel", cancelHold);

          btn.addEventListener("click", function () {
            if (holdTriggered) { holdTriggered = false; return; } // the hold already opened the volume picker
            var level = grid[row][step] ? 0 : DEFAULT_VOLUME_LEVEL;
            grid[row][step] = level;
            btn.classList.toggle("active", level > 0);
            updateVolClass(btn, level);
            if (level > 0) playTone(NOTES[row].freq, 0.2, VOLUME_LEVELS[level - 1].gain * masterVolumeMult);
          });
        })(row, step, btn);

        rowEl.appendChild(btn);
        rowButtons.push(btn);
      }
      cellButtons.push(rowButtons);
      chartEl.appendChild(rowEl);
    });

    // Re-paint the chart's active-cell highlighting to match whatever `grid` now is.
    function renderChartFromGrid() {
      for (var row = 0; row < NOTES.length; row++) {
        for (var step = 0; step < STEPS; step++) {
          var level = grid[row][step];
          cellButtons[row][step].classList.toggle("active", level > 0);
          updateVolClass(cellButtons[row][step], level);
        }
      }
    }

    var holdTimer = null;
    var holdTriggered = false;

    function startHold(row, step) {
      clearTimeout(holdTimer);
      holdTriggered = false;
      holdTimer = setTimeout(function () {
        holdTriggered = true;
        openVolumeModal(row, step);
      }, 380);
    }

    function cancelHold() {
      clearTimeout(holdTimer);
    }

    var partsRow = document.getElementById("partsRow");

    function renderPartTabs() {
      partsRow.innerHTML = "";
      parts.forEach(function (part, index) {
        var tab = document.createElement("button");
        tab.className = "part-tab" + (index === currentPartIndex ? " active" : "");
        tab.textContent = "Part " + (index + 1);

        if (parts.length > 1) {
          var delBtn = document.createElement("span");
          delBtn.className = "part-delete";
          delBtn.textContent = "✖";
          delBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            deletePart(index);
          });
          tab.appendChild(delBtn);
        }

        tab.addEventListener("click", function () { switchToPart(index); });
        partsRow.appendChild(tab);
      });

      var addBtn = document.createElement("button");
      addBtn.className = "part-add-btn";
      addBtn.textContent = "➕ Add New Part to Song";
      addBtn.addEventListener("click", addNewPart);
      partsRow.appendChild(addBtn);
    }

    function switchToPart(index) {
      currentPartIndex = index;
      grid = parts[currentPartIndex];
      renderChartFromGrid();
      renderPartTabs();
    }

    function addNewPart() {
      parts.push(makeEmptyGrid());
      switchToPart(parts.length - 1);
    }

    function deletePart(index) {
      if (parts.length <= 1) return; // always keep at least one part
      parts.splice(index, 1);
      var newIndex = Math.min(index, parts.length - 1);
      switchToPart(newIndex);
    }

    renderPartTabs();

    var audioCtx = null;
    function playTone(freq, duration, gain) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = "sine";
        o.frequency.value = freq;
        g.gain.value = typeof gain === "number" ? gain : 0.2;
        o.connect(g); g.connect(audioCtx.destination);
        o.start();
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        o.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    var playBtn = document.getElementById("playBtn");
    var playInterval = null;
    var currentStep = -1;
    var msPerStep = 250;
    var playing = false;

    function clearPlayhead() {
      cellButtons.forEach(function (rowButtons) {
        rowButtons.forEach(function (btn) { btn.classList.remove("playhead"); });
      });
    }

    function advanceStep() {
      clearPlayhead();
      currentStep++;
      if (currentStep >= STEPS) {
        currentStep = 0;
        currentPartIndex = (currentPartIndex + 1) % parts.length;
        grid = parts[currentPartIndex];
        renderChartFromGrid();
        renderPartTabs();
      }
      for (var row = 0; row < NOTES.length; row++) {
        cellButtons[row][currentStep].classList.add("playhead");
        var level = grid[row][currentStep];
        if (level > 0) playTone(NOTES[row].freq, 0.35, VOLUME_LEVELS[level - 1].gain * masterVolumeMult);
      }
    }

    function startPlaying() {
      playing = true;
      playBtn.textContent = "⏹️ Stop";
      playBtn.classList.add("playing");
      currentStep = -1;
      advanceStep();
      playInterval = setInterval(advanceStep, msPerStep);
    }

    function stopPlaying() {
      playing = false;
      playBtn.textContent = "▶️ Play";
      playBtn.classList.remove("playing");
      clearInterval(playInterval);
      clearPlayhead();
    }

    playBtn.addEventListener("click", function () {
      if (playing) stopPlaying(); else startPlaying();
    });

    document.getElementById("clearBtn").addEventListener("click", function () {
      stopPlaying();
      grid.forEach(function (row) { row.fill(0); });
      cellButtons.forEach(function (rowButtons) {
        rowButtons.forEach(function (btn) {
          btn.classList.remove("active");
          updateVolClass(btn, 0);
        });
      });
    });

    document.getElementById("newSongBtn").addEventListener("click", function () {
      stopPlaying();
      parts = [makeEmptyGrid()];
      currentPartIndex = 0;
      grid = parts[currentPartIndex];
      renderChartFromGrid();
      renderPartTabs();

      msPerStep = 250;
      document.querySelectorAll("#speedRow .speed-btn").forEach(function (b) {
        b.classList.toggle("active", parseInt(b.getAttribute("data-speed"), 10) === msPerStep);
      });

      masterVolumeMult = 1;
      document.querySelectorAll("#volumeRow .speed-btn").forEach(function (b) {
        b.classList.toggle("active", parseFloat(b.getAttribute("data-vol")) === masterVolumeMult);
      });

      currentSongId = null;
      renderSongList();
      showStatus("🆕 Started a new song — build it, then hit Save!");
    });

    document.querySelectorAll("#speedRow .speed-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        document.querySelectorAll("#speedRow .speed-btn").forEach(function (b) { b.classList.remove("active"); });
        btn.classList.add("active");
        msPerStep = parseInt(btn.getAttribute("data-speed"), 10);
        if (playing) {
          clearInterval(playInterval);
          playInterval = setInterval(advanceStep, msPerStep);
        }
      });
    });

    var masterVolumeMult = 1;
    document.querySelectorAll("#volumeRow .speed-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        document.querySelectorAll("#volumeRow .speed-btn").forEach(function (b) { b.classList.remove("active"); });
        btn.classList.add("active");
        masterVolumeMult = parseFloat(btn.getAttribute("data-vol"));
      });
    });

    var SONGS_KEY = "bensMusicMakerSongs";
    var OLD_SINGLE_SONG_KEY = "bensMusicMakerSong"; // from the old one-song-only version
    var saveStatus = document.getElementById("saveStatus");
    var saveStatusTimer = null;
    var currentSongId = null;

    function showStatus(msg) {
      saveStatus.textContent = msg;
      saveStatus.classList.add("show");
      clearTimeout(saveStatusTimer);
      saveStatusTimer = setTimeout(function () { saveStatus.classList.remove("show"); }, 2200);
    }

    function loadAllSongs() {
      var raw;
      try { raw = localStorage.getItem(SONGS_KEY); } catch (e) { return []; }
      if (!raw) return [];
      try {
        var songs = JSON.parse(raw);
        return Array.isArray(songs) ? songs : [];
      } catch (e) { return []; }
    }

    function saveAllSongs(songs) {
      try { localStorage.setItem(SONGS_KEY, JSON.stringify(songs)); } catch (e) {}
    }

    // Bring forward a song saved by the old single-song version, if any.
    function migrateOldSingleSong() {
      var raw;
      try { raw = localStorage.getItem(OLD_SINGLE_SONG_KEY); } catch (e) { return; }
      if (!raw) return;
      try {
        var old = JSON.parse(raw);
        if (old && old.grid) {
          var songs = loadAllSongs();
          songs.push({ id: 1, name: "My First Song", grid: old.grid, msPerStep: old.msPerStep || 250 });
          saveAllSongs(songs);
        }
      } catch (e) {}
      try { localStorage.removeItem(OLD_SINGLE_SONG_KEY); } catch (e) {}
    }

    function applySongToChart(song) {
      // New songs store `parts` (an array of grids). Older saved songs only
      // have a single `grid` — treat that as a one-part song. Even older
      // songs stored `true`/`false` instead of a volume level (1/2/3) —
      // bring those forward as medium volume.
      var loadedParts = song.parts && song.parts.length ? song.parts : [song.grid];
      parts = loadedParts.map(function (part) {
        return part.map(function (row) {
          return row.map(function (cell) {
            if (cell === true) return DEFAULT_VOLUME_LEVEL;
            return typeof cell === "number" ? cell : 0;
          });
        });
      });
      currentPartIndex = 0;
      grid = parts[currentPartIndex];
      renderChartFromGrid();
      renderPartTabs();

      if (song.msPerStep) {
        msPerStep = song.msPerStep;
        document.querySelectorAll("#speedRow .speed-btn").forEach(function (b) {
          b.classList.toggle("active", parseInt(b.getAttribute("data-speed"), 10) === msPerStep);
        });
      }

      masterVolumeMult = typeof song.masterVolumeMult === "number" ? song.masterVolumeMult : 1;
      document.querySelectorAll("#volumeRow .speed-btn").forEach(function (b) {
        b.classList.toggle("active", parseFloat(b.getAttribute("data-vol")) === masterVolumeMult);
      });
    }

    function renderSongList() {
      var songs = loadAllSongs();
      var grid2 = document.getElementById("songsGrid");
      var empty = document.getElementById("songsEmpty");
      grid2.innerHTML = "";
      empty.style.display = songs.length ? "none" : "block";

      songs.forEach(function (song) {
        var card = document.createElement("div");
        card.className = "song-card" + (song.id === currentSongId ? " active" : "");

        var nameEl = document.createElement("div");
        nameEl.className = "song-name";
        nameEl.textContent = "🎵 " + song.name;
        card.appendChild(nameEl);

        var renameBtn = document.createElement("div");
        renameBtn.className = "song-rename";
        renameBtn.textContent = "✏️";
        renameBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          openRenameModal(song);
        });
        card.appendChild(renameBtn);

        var delBtn = document.createElement("div");
        delBtn.className = "song-delete";
        delBtn.textContent = "✖";
        delBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          var remaining = loadAllSongs().filter(function (s) { return s.id !== song.id; });
          saveAllSongs(remaining);
          if (currentSongId === song.id) currentSongId = null;
          renderSongList();
        });
        card.appendChild(delBtn);

        card.addEventListener("click", function () {
          stopPlaying();
          applySongToChart(song);
          currentSongId = song.id;
          renderSongList();
          showStatus("🎶 Loaded \"" + song.name + "\"!");
        });

        grid2.appendChild(card);
      });
    }

    var volumeModalOverlay = document.getElementById("volumeModalOverlay");
    var volumeTargetRow = null;
    var volumeTargetStep = null;

    function openVolumeModal(row, step) {
      volumeTargetRow = row;
      volumeTargetStep = step;
      var current = grid[row][step];
      document.querySelectorAll(".volume-btn").forEach(function (b) {
        b.classList.toggle("current", parseInt(b.getAttribute("data-level"), 10) === current);
      });
      volumeModalOverlay.classList.add("show");
    }

    function closeVolumeModal() {
      volumeModalOverlay.classList.remove("show");
      volumeTargetRow = null;
      volumeTargetStep = null;
    }

    document.querySelectorAll(".volume-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        if (volumeTargetRow === null) return;
        var level = parseInt(btn.getAttribute("data-level"), 10);
        grid[volumeTargetRow][volumeTargetStep] = level;
        var cellBtn = cellButtons[volumeTargetRow][volumeTargetStep];
        cellBtn.classList.toggle("active", level > 0);
        updateVolClass(cellBtn, level);
        if (level > 0) playTone(NOTES[volumeTargetRow].freq, 0.25, VOLUME_LEVELS[level - 1].gain * masterVolumeMult);
        closeVolumeModal();
      });
    });

    volumeModalOverlay.addEventListener("click", function (e) {
      if (e.target === volumeModalOverlay) closeVolumeModal();
    });

    var nameModalOverlay = document.getElementById("nameModalOverlay");
    var nameModalInput = document.getElementById("nameModalInput");
    var nameModalTitle = document.getElementById("nameModalTitle");
    var modalMode = "save"; // "save" (creating a new song) or "rename" (renaming one that exists)
    var renamingSongId = null;

    function openNameModal() {
      modalMode = "save";
      nameModalTitle.textContent = "🎵 Name your song!";
      var count = loadAllSongs().length;
      nameModalInput.value = "Song " + (count + 1);
      nameModalOverlay.classList.add("show");
      setTimeout(function () { nameModalInput.focus(); nameModalInput.select(); }, 50);
    }

    function openRenameModal(song) {
      modalMode = "rename";
      renamingSongId = song.id;
      nameModalTitle.textContent = "✏️ Rename your song!";
      nameModalInput.value = song.name;
      nameModalOverlay.classList.add("show");
      setTimeout(function () { nameModalInput.focus(); nameModalInput.select(); }, 50);
    }

    function closeNameModal() {
      nameModalOverlay.classList.remove("show");
    }

    function confirmNameModal() {
      var typed = nameModalInput.value.trim();

      if (modalMode === "rename") {
        if (typed) {
          var songs = loadAllSongs();
          for (var i = 0; i < songs.length; i++) {
            if (songs[i].id === renamingSongId) { songs[i].name = typed; break; }
          }
          saveAllSongs(songs);
          renderSongList();
          showStatus("✏️ Renamed to \"" + typed + "\"!");
        }
        closeNameModal();
        return;
      }

      var name = typed || ("Song " + (loadAllSongs().length + 1));
      var songs = loadAllSongs();
      var newSong = {
        id: Date.now(),
        name: name,
        parts: parts.map(function (part) {
          return part.map(function (row) { return row.slice(); });
        }),
        msPerStep: msPerStep,
        masterVolumeMult: masterVolumeMult
      };
      songs.push(newSong);
      saveAllSongs(songs);
      currentSongId = newSong.id;
      renderSongList();
      closeNameModal();
      showStatus("💾 Saved \"" + name + "\"!");
    }

    document.getElementById("saveBtn").addEventListener("click", openNameModal);
    document.getElementById("nameModalSaveBtn").addEventListener("click", confirmNameModal);
    document.getElementById("nameModalCancelBtn").addEventListener("click", closeNameModal);
    nameModalOverlay.addEventListener("click", function (e) {
      if (e.target === nameModalOverlay) closeNameModal();
    });
    nameModalInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); confirmNameModal(); }
    });

    migrateOldSingleSong();
    renderSongList();

    var tipIndex = -1;
    document.getElementById("tipNextBtn").addEventListener("click", function () {
      var next;
      do { next = Math.floor(Math.random() * TIPS.length); } while (next === tipIndex && TIPS.length > 1);
      tipIndex = next;
      document.getElementById("tipText").textContent = TIPS[tipIndex];
    });
  </script>
</body>
</html>
